services:
  app:
    build:
      context: .
      target: app
    image: covercraft:latest
    ports:
      - "${APP_PORT:-8010}:8000"
    env_file:
      - .env.docker
    volumes:
      - storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - covercraft
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  horizon:
    image: covercraft:latest
    command: php artisan horizon
    stop_signal: SIGTERM
    stop_grace_period: 30s
    env_file:
      - .env.docker
    volumes:
      - storage:/app/storage
    depends_on:
      app:
        condition: service_healthy
    networks:
      - covercraft
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  scheduler:
    image: covercraft:latest
    command: php artisan schedule:work
    env_file:
      - .env.docker
    volumes:
      - storage:/app/storage
    depends_on:
      app:
        condition: service_healthy
    networks:
      - covercraft
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-covercraft}
      POSTGRES_USER: ${DB_USERNAME:-covercraft}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - covercraft
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-covercraft} -d ${DB_DATABASE:-covercraft}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis:/data
    networks:
      - covercraft
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres:
  redis:
  storage:

networks:
  covercraft:
    driver: bridge
